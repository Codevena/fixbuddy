name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  shell:
    name: Shell checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax
        run: |
          bash -n fixbuddy.sh
          bash -n fixbuddy-wizard.sh

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck fixbuddy.sh fixbuddy-wizard.sh
